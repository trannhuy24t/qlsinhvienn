<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập</title>
    <link rel="stylesheet" href="../css/danghap.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="wrapper">
        <form id="formlogin" method="post" action="../php/login.php" autocomplete="off">
            <h1>Login</h1>

            <div class="input-box">
                <input type="text" placeholder="Mã số SV / GV" id="username" name="username" required autocomplete="off">
                <i class='bx bxs-user'></i>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Password" id="password" name="password"required autocomplete="new-password">
                <i class='bx bxs-lock-alt'></i>
            </div>

            <div id="alertError" style="display: none; color: #ff4d4d; margin-bottom: 10px; font-size: 14px; text-align: center;">
                Lỗi đăng nhập!
            </div>

            <div class="remember-forgot">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn">Login</button>

            <div class="register-link">
                <p>Don't have an account? <a href="./dangky.html">Register</a></p>
            </div>
        </form>
    </div>

    <script src="../js/dangnhap.js"></script>
</body>
</html>
