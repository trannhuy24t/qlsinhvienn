<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký</title>
    <link rel="stylesheet" href="../css/dangky.css">
</head>
<body>
   <div class="wrapper">
     <form action="../php/dangky.php" method="post" id="formdangky">
        <h1>Đăng ký tài khoản</h1>

        <!-- MÃ SV / GV -->
        <div class="input-box">
            <label for="ma">Mã SV / GV:</label>
            <input type="text" name="ma" id="ma" placeholder="Nhập mã sinh viên hoặc giảng viên">
        </div>

        <!-- USERNAME -->
        <div class="input-box">
            <label for="username">Họ Và Tên :</label>
            <input type="text" name="username" id="username" placeholder="Nhập họ và tên">
        </div>

        <!-- PASSWORD -->
        <div class="input-box">
            <label for="password">Mật khẩu:</label>
            <input type="password" name="password" id="password" placeholder="Nhập mật khẩu">
        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="input-box">
            <label for="confirmpassword">Xác nhận mật khẩu:</label>
            <input type="password" name="confirmpassword" id="confirmpassword" placeholder="Xác nhận mật khẩu">
        </div>

        <!-- ERROR -->
        <div id="alertError" style="color:red; display: none;">
            Vui lòng nhập đầy đủ thông tin
        </div>

        <button class="btn" type="submit">Đăng Ký</button>

        <p class="p1">
            Bạn đã có tài khoản?
            <a href="./dangnhap.html">Đăng Nhập</a>
        </p>
    </form>
   </div>

   <script src="../js/dangky.js"></script>
</body>
</html>
