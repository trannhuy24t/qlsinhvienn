<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý điểm - Hệ Thống Quản Lý Sinh Viên</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/diem.css">
</head>
<body>
    <header class="main-header">
        <h1>Hệ Thống Quản Lý Sinh Viên</h1>
        <nav class="navbar">
            <ul>
                <li><a href="../php/home.php"><i class="fas fa-home"></i> Trang chủ</a></li>
                <li><a href="sinhVien.html"><i class="fas fa-user-graduate"></i> Sinh viên</a></li>
                <li><a href="lopHoc.html"><i class="fas fa-school"></i> Lớp học</a></li>
                <li><a href="monHoc.html"><i class="fas fa-book"></i> Môn học</a></li>
                <li><a href="giangVien.html"><i class="fas fa-chalkboard-teacher"></i> Giảng viên</a></li>
                <li><a href="diem.html" class="active"><i class="fas fa-edit"></i> Bảng điểm</a></li>
                <li><a href="baoCao.html"><i class="fas fa-file-alt"></i> Báo cáo</a></li>
                <li><a href="thongKe.html"><i class="fas fa-chart-line"></i> Thống kê</a></li>
                <li><a href="dangnhap.html"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1 class="page-title">📊 Quản lý điểm</h1>

        <section class="card">
            <h3><i class="fas fa-plus-circle"></i> Nhập điểm sinh viên</h3>
            <form onsubmit="save(); return false;" class="grid-form">
                <div class="input-group">
                    <label>Sinh viên</label>
                    <select id="sv"></select>
                </div>
                <div class="input-group">
                    <label>Lớp học phần</label>
                    <select id="lhp"></select>
                </div>
                <div class="input-group">
                    <label>Chuyên cần</label>
                    <input id="cc" type="number" step="0.1" placeholder="0.0">
                </div>
                <div class="input-group">
                    <label>Giữa kỳ</label>
                    <input id="gk" type="number" step="0.1" placeholder="0.0">
                </div>
                <div class="input-group">
                    <label>Cuối kỳ</label>
                    <input id="ck" type="number" step="0.1" placeholder="0.0">
                </div>
                <button type="submit" class="btn-save">Lưu điểm</button> 
            </form>
        </section>

        <section class="card">
            <h3><i class="fas fa-list-alt"></i> Danh sách điểm vừa nhập</h3>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>SV</th>
                            <th>Môn</th>
                            <th>CC</th>
                            <th>GK</th>
                            <th>CK</th>
                            <th>Tổng</th>
                            <th>Xếp loại</th>
                        </tr>
                    </thead>
                    <tbody id="table">
                        </tbody>
                </table>
            </div>
        </section>

        <section class="card">
            <h3><i class="fas fa-graduation-cap"></i> Tổng kết bảng điểm</h3>
            <div class="action-bar">
                <select id="svTong" style="max-width: 300px;"></select>
                <button onclick="loadBangDiem()" class="btn-primary">Xem bảng điểm</button>
                <button class="btn-pdf" onclick="xuatPDF()"><i class="fas fa-file-pdf"></i> Xuất PDF</button>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Môn</th>
                            <th>Tín chỉ</th>
                            <th>Điểm</th>
                            <th>Xếp loại</th>
                        </tr>
                    </thead>
                    <tbody id="bangdiem"></tbody>
                </table>
            </div>
            <div class="result-summary">
                <h3 id="tongket"></h3>
            </div>
        </section>
    </main>

    <script src="../js/diem.js"></script>
</body>
</html>
