<h2>📚 Quản lý Môn học</h2>

<div class="grid">

<div class="card">
<h3>Thêm môn</h3>
<form onsubmit="addMon(); return false;">
<input id="mamon" placeholder="Mã môn">
<input id="tenmon" placeholder="Tên môn">
<input id="sotinchi" placeholder="Số tín chỉ">
<input id="mota" placeholder="Mô tả">
<button>Thêm</button>
</form>
</div>

<div class="card">
<h3>Học kỳ</h3>
<form onsubmit="addHK(); return false;">
<input id="mahocky" placeholder="Mã HK">
<input id="tenhocky" placeholder="Tên HK">
<input id="namhoc" placeholder="Năm học">
<button>Thêm</button>
</form>
</div>

<div class="card">
<h3>Lớp học phần</h3>
<form onsubmit="addLHP(); return false;">
<input id="malhp" placeholder="Mã LHP">
<input id="magv" placeholder="Mã GV">

<select id="mamonSelect"></select>
<select id="hkSelect"></select>

<button>Mở lớp</button>
</form>
</div>

</div>

<hr>

<h3>Danh sách môn học</h3>
<table>
<thead>
<tr><th>Mã</th><th>Tên</th><th>TC</th><th>Mô tả</th><th></th></tr>
</thead>
<tbody id="monTable"></tbody>
</table>

<h3>Lớp học phần</h3>
<table>
<thead>
