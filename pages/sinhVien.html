<main class="main-content">
    <h2 class="page-title">Quản lý sinh viên</h2>

    <div class="card-form">
        <form id="formsinhvien" onsubmit="add(); return false;">
            <div class="input-row">
                <input id="masv" name="masv" placeholder="Mã SV">
                <input id="hoten" name="hoten" placeholder="Họ tên">
                <input type="date" id="ngaysinh" name="ngaysinh">
                <select id="gioitinh" name="gioitinh">
                    <option value="">Giới tính</option>
                    <option>Nam</option>
                    <option>Nữ</option>
                </select>
            </div>
            <div class="input-row">
                <input id="email" name="email" placeholder="Email">
                <input id="sodienthoai" name="sodienthoai" placeholder="SĐT">
                <input id="diachi" name="diachi" placeholder="Địa chỉ">
                <input id="malop" name="malop" placeholder="Mã lớp">
                <input type="text" id="tenlop" name="tenlop" placeholder="Tên lớp">
            </div>
            <div class="input-row action-row">
                <input type="file" id="anh" name="anh" class="file-input">
                <button id="btn-submit" onclick="add()" class="btn-save">Thêm sinh viên</button>
            </div>
        </form>
    </div>

    <div class="search-section">
        <h3><i class="fas fa-search"></i> Tìm kiếm nhanh</h3>
        <div class="search-grid">
            <input id="s_masv" placeholder="Mã SV">
            <input id="s_hoten" placeholder="Họ tên">
            <input id="s_malop" placeholder="Lớp">
            <select id="s_gioitinh">
                <option value="">Giới tính</option>
                <option>Nam</option>
                <option>Nữ</option>
            </select>
            <div class="date-range">
                <span>Từ:</span> <input type="date" id="from">
                <span>Đến:</span> <input type="date" id="to">
            </div>
            <button onclick="search()" class="btn-search">Tìm kiếm</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Mã SV</th>
                    <th>Họ tên</th>
                    <th>Mã Lớp</th>
                    <th>Giới tính</th>
                    <th> Tên lớp</th>
                    <th>Ảnh</th>
                    <th>Hành động</th>
